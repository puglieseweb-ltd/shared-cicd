name: SAM Deploy with Prerequisites

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: false
        default: '.'
        description: Directory containing the SAM template
      stack-name:
        type: string
        required: true
        description: Main CloudFormation stack name
      aws-region:
        type: string
        required: false
        default: 'eu-west-2'
      python-version:
        type: string
        required: false
        default: '3.11'
      parameter-overrides:
        type: string
        required: false
        default: ''
        description: SAM parameter overrides
      capabilities:
        type: string
        required: false
        default: 'CAPABILITY_IAM'
      environment:
        type: string
        required: false
        default: 'production'
      deploy-role-name:
        type: string
        required: true
      # --- Prereq hooks ---
      secrets-stack-template-path:
        type: string
        required: false
        default: ''
        description: Path to CloudFormation template for secrets stack. If set, deploys this stack before the main stack.
      secrets-stack-name:
        type: string
        required: false
        default: ''
        description: Name for the secrets stack. Required when secrets-stack-template-path is set.
      secrets-to-seed:
        type: string
        required: false
        default: ''
        description: |
          Multi-line list of "<secret-path>:<github-secret-env-var-name>" entries.
          For each, if the current value in AWS Secrets Manager is "PLACEHOLDER", seed it
          from the matching env var. Requires SEED_SECRETS_JSON secret (JSON object
          mapping env var name -> value).
          Example:
            /pweb-billing/prod/sentry-dsn:SENTRY_DSN
            /pweb-billing/prod/stripe-secret-key:STRIPE_SECRET_KEY
      layer-packages:
        type: string
        required: false
        default: ''
        description: |
          Multi-line list of pip package specifiers to install into a Lambda
          layer before `sam build`. One spec per line. Supports:
            - PyPI:              requests==2.31.0
            - local path:        ./packages/pweb-email-templates
            - cross-repo git:    git+https://github.com/<org>/<repo>@<ref>#subdirectory=<path>
          For cross-repo git URLs in private repos, set the CROSS_REPO_TOKEN
          secret. The reusable configures git credential.helper=store with
          that token so pip clones transparently.
      layer-install-target:
        type: string
        required: false
        default: 'layers/common/python/lib/python3.11/site-packages'
        description: |
          pip install -t target, relative to working-directory. Default is
          the conventional Python 3.11 layer path. Directory is created if
          missing.
    secrets:
      AWS_ACCOUNT_ID:
        required: true
      PARAMETER_SECRETS:
        required: false
      SEED_SECRETS_JSON:
        required: false
        description: JSON object mapping env var name -> value, used by secrets-to-seed
      CROSS_REPO_TOKEN:
        required: false
        description: |
          GitHub PAT with read access to cross-repo private packages. When
          provided together with layer-packages that include git+https://...
          URLs, the reusable writes ~/.git-credentials so pip's underlying
          git clone picks up the token automatically. Cleaned up after the
          step so the credential doesn't persist into subsequent steps.

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.deploy-role-name }}
          aws-region: ${{ inputs.aws-region }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Deploy secrets stack
        if: inputs.secrets-stack-template-path != ''
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -z "${{ inputs.secrets-stack-name }}" ]; then
            echo "::error::secrets-stack-name is required when secrets-stack-template-path is set"
            exit 1
          fi
          ENV_PARAM=""
          # Extract Environment value from parameter-overrides if present
          if echo "${{ inputs.parameter-overrides }}" | grep -q "Environment="; then
            ENV_VALUE=$(echo "${{ inputs.parameter-overrides }}" | grep -oE 'Environment=[^ ]+' | head -1 | cut -d= -f2)
            ENV_PARAM="Environment=$ENV_VALUE"
          fi
          aws cloudformation deploy \
            --template-file "${{ inputs.secrets-stack-template-path }}" \
            --stack-name "${{ inputs.secrets-stack-name }}" \
            --no-fail-on-empty-changeset \
            --region "${{ inputs.aws-region }}" \
            ${ENV_PARAM:+--parameter-overrides $ENV_PARAM}

      - name: Seed secrets from GitHub Secrets
        if: inputs.secrets-to-seed != ''
        env:
          SEED_SECRETS_JSON: ${{ secrets.SEED_SECRETS_JSON }}
        run: |
          if [ -z "$SEED_SECRETS_JSON" ]; then
            echo "::warning::secrets-to-seed was provided but SEED_SECRETS_JSON secret is empty — skipping"
            exit 0
          fi
          while IFS= read -r LINE; do
            LINE="$(echo "$LINE" | xargs)"
            [ -z "$LINE" ] && continue
            SECRET_PATH="${LINE%%:*}"
            VAR_NAME="${LINE##*:}"
            VALUE=$(echo "$SEED_SECRETS_JSON" | jq -r --arg k "$VAR_NAME" '.[$k] // ""')
            if [ -z "$VALUE" ]; then
              echo "  Skipped $SECRET_PATH (no value for $VAR_NAME)"
              continue
            fi
            CURRENT=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_PATH" \
              --query SecretString --output text \
              --region "${{ inputs.aws-region }}" 2>/dev/null || echo "")
            if [ "$CURRENT" = "PLACEHOLDER" ]; then
              aws secretsmanager put-secret-value \
                --secret-id "$SECRET_PATH" \
                --secret-string "$VALUE" \
                --region "${{ inputs.aws-region }}"
              echo "  Seeded $SECRET_PATH from $VAR_NAME"
            else
              echo "  Skipped $SECRET_PATH (already set)"
            fi
          done <<< "${{ inputs.secrets-to-seed }}"

      - name: Install layer packages
        if: inputs.layer-packages != ''
        working-directory: ${{ inputs.working-directory }}
        env:
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          set -euo pipefail

          # Configure cross-repo git credentials if a token was provided.
          # Using credential.helper=store is more robust than insteadOf-
          # with-env-var-interpolation because pip's git subprocess picks
          # up the credentials automatically without shell expansion quirks.
          if [ -n "${CROSS_REPO_TOKEN:-}" ]; then
            echo "https://oauth2:${CROSS_REPO_TOKEN}@github.com" > "$HOME/.git-credentials"
            chmod 600 "$HOME/.git-credentials"
            git config --global credential.helper store
            CREDENTIALS_CONFIGURED=1
          else
            CREDENTIALS_CONFIGURED=0
          fi

          cleanup() {
            if [ "$CREDENTIALS_CONFIGURED" = "1" ]; then
              rm -f "$HOME/.git-credentials"
              git config --global --unset credential.helper 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          mkdir -p "${{ inputs.layer-install-target }}"

          while IFS= read -r PKG; do
            PKG="$(echo "$PKG" | xargs)"
            [ -z "$PKG" ] && continue
            echo "::group::pip install $PKG"
            pip install "$PKG" -t "${{ inputs.layer-install-target }}"
            echo "::endgroup::"
          done <<< "${{ inputs.layer-packages }}"

      - name: SAM build
        working-directory: ${{ inputs.working-directory }}
        # Build on the runner's host Python instead of inside a Docker
        # container. `--use-container` was removed because our Lambdas
        # use arm64 architecture and GitHub's ubuntu-latest runners are
        # x86_64, which forces SAM to run the arm64 Python container
        # under qemu emulation. Emulated pip installs are 10-30x slower
        # and hang indefinitely under --parallel contention (observed:
        # shared-notifications run 24390441769 hung for 40+ minutes on
        # a 2-package layer).
        #
        # None of the shared-* Lambdas use native (C-extension)
        # dependencies, so host-Python builds are correct. If a future
        # caller adds native deps (numpy, Pillow, etc.), the layer-
        # packages input can be extended or this workflow can gain a
        # `use-container: boolean` input to opt back in per-caller.
        run: sam build --parallel

      - name: SAM deploy
        working-directory: ${{ inputs.working-directory }}
        run: |
          PARAMS="${{ inputs.parameter-overrides }}"
          if [ -n "${{ secrets.PARAMETER_SECRETS }}" ]; then
            PARAMS="$PARAMS ${{ secrets.PARAMETER_SECRETS }}"
          fi
          sam deploy \
            --stack-name "${{ inputs.stack-name }}" \
            --region "${{ inputs.aws-region }}" \
            --capabilities ${{ inputs.capabilities }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            ${PARAMS:+--parameter-overrides $PARAMS}

      - name: Deployment summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## SAM Deployment Summary
          | Detail | Value |
          |--------|-------|
          | **Stack** | \`${{ inputs.stack-name }}\` |
          | **Region** | \`${{ inputs.aws-region }}\` |
          | **Environment** | \`${{ inputs.environment }}\` |
          EOF
