name: Branch Hygiene

# Caller for shared-cicd itself — invokes the reusable branch-hygiene
# workflow so the check-run name matches the org ruleset requirement:
# "check / Block pushes to merged branches"

on:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    uses: puglieseweb-ltd/shared-cicd/.github/workflows/branch-hygiene.yml@main
    permissions:
      contents: read
      pull-requests: read
