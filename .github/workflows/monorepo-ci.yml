name: Monorepo CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: '22'
      app-filter:
        description: 'pnpm workspace filter (e.g. @facegov/app). If empty, runs on all workspaces'
        type: string
        default: ''
      run-type-check:
        description: Whether to run type-check
        type: boolean
        default: true
      run-tests:
        description: Whether to run tests
        type: boolean
        default: true

jobs:
  ci:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: inputs.run-type-check
        run: |
          if [ -n "${{ inputs.app-filter }}" ]; then
            pnpm --filter "${{ inputs.app-filter }}" run type-check
          else
            pnpm type-check
          fi

      - name: Test
        if: inputs.run-tests
        run: |
          if [ -n "${{ inputs.app-filter }}" ]; then
            pnpm --filter "${{ inputs.app-filter }}" run test
          else
            pnpm test
          fi
